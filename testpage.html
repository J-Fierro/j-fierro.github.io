<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>P8 Sheet Embed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    .wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Overlay transparente que bloquea hover y clicks */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999;
      background: transparent;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Reemplaza el src con tu link de Google Sheets -->
    <iframe
      src="TU_LINK_DE_GOOGLE_SHEETS_AQUI"
      allowfullscreen
    ></iframe>
    <div class="overlay"></div>
  </div>
</body>
</html>
